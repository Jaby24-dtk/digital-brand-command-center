<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Brand Command Center — Live brand asset dashboard" />
  <meta name="theme-color" content="#06060E" />
  <title>Digital Brand Command Center</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Phosphor Icons (SVG icon system via CSS) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1" defer></script>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C9A96E'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='18' font-family='serif'>◈</text></svg>" />
</head>
<body>

  <!-- App root — JS builds the entire DOM inside here -->
  <div id="app" role="application" aria-label="Digital Brand Command Center"></div>

  <!--
    ════════════════════════════════════════════════════════════════
    TO CONNECT YOUR GOOGLE SHEETS DATA:
      1. Open config.js
      2. Set USE_DEMO_DATA to false
      3. Paste your published CSV URL(s) into SHEETS or your
         Apps Script Web App URL into DATA_SOURCE_URL
    ════════════════════════════════════════════════════════════════

    TO ADD RIVE ANIMATIONS:
      1. Import the Rive runtime: <script src="https://unpkg.com/@rive-app/canvas@latest/rive.js"></script>
      2. Target elements with data-rive-target attributes (see animations.css for notes)
      3. Replace counter/ring/loading DOM nodes with <canvas> elements
         and init via: new rive.Rive({ canvas, src: 'your.riv', autoplay: true })
    ════════════════════════════════════════════════════════════════
  -->

  <!-- Inline global error handler — registered before any external script loads -->
  <script>
    window.onerror = function(msg, src, line, col) {
      var el = document.getElementById('pre-js') || document.getElementById('app');
      if (el) el.innerHTML =
        '<div style="padding:32px;font-family:sans-serif;max-width:680px;margin:40px auto">' +
        '<h3 style="color:#C43040;font-size:15px;margin:0 0 12px">&#9888; JavaScript error — dashboard cannot start</h3>' +
        '<pre style="background:rgba(196,48,64,0.07);border:1px solid rgba(196,48,64,0.2);padding:12px;' +
        'border-radius:8px;font-size:11px;white-space:pre-wrap;word-break:break-all;margin:0 0 12px">' +
        (msg||'') + '\n' + (src||'') + ':' + (line||0) + ':' + (col||0) + '</pre>' +
        '<button onclick="location.reload()" style="padding:8px 20px;background:#FFD0E6;border:1px solid #F4AECB;' +
        'border-radius:8px;cursor:pointer;font-weight:600;font-size:13px">Reload page</button>' +
        '</div>';
      return false;
    };
  </script>

  <!-- Pre-JS loading screen — visible immediately, removed by app.js on mount -->
  <style>
    #pre-js {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; z-index: 9999;
      background: linear-gradient(135deg, #FFD0E6 0%, #F8F2FF 42%, #C8EDD8 100%);
      font-family: 'Inter', sans-serif;
    }
    #pre-js .pj-box { text-align: center; padding: 32px; }
    #pre-js .pj-icon { font-size: 40px; margin-bottom: 16px; }
    #pre-js .pj-title { font-size: 15px; font-weight: 600; color: #1A1028; margin: 0 0 8px; }
    #pre-js .pj-sub { font-size: 13px; color: rgba(26,16,40,0.55); margin: 0; }
  </style>
  <div id="pre-js">
    <div class="pj-box">
      <div class="pj-icon">⏳</div>
      <p class="pj-title">Loading Digital Brand Command Center</p>
      <p class="pj-sub">If this persists more than 5 seconds, open browser console (F12) for errors</p>
    </div>
  </div>

  <!-- Config must load before everything else -->
  <script src="config.js"></script>

  <!-- Data layer -->
  <script src="js/data.js"></script>

  <!-- Component renderers -->
  <script src="js/components.js"></script>

  <!-- App orchestration -->
  <script src="js/app.js"></script>

</body>
</html>
