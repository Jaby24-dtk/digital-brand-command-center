<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Brand Command Center — Live brand asset dashboard" />
  <meta name="theme-color" content="#06060E" />
  <title>Digital Brand Command Center</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Phosphor Icons (SVG icon system via CSS) -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1" defer></script>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C9A96E'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='18' font-family='serif'>◈</text></svg>" />
</head>
<body>

  <!-- Boot status — visible BEFORE any JS runs. Removed only after successful render.
       Uses only inline styles and Arial font so it renders with zero external dependencies. -->
  <div id="boot-status" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;padding:40px;font-family:Arial;color:#111;background:#fff;display:flex;align-items:center;justify-content:center;">
    <div id="boot-status-inner" style="text-align:center;max-width:520px;width:100%">
      <div style="font-size:32px;margin-bottom:12px">⏳</div>
      <div style="font-size:16px;font-weight:bold;margin-bottom:8px">DBCC is loading...</div>
      <div style="font-size:13px;color:#555;margin-bottom:16px">Digital Brand Command Center</div>
      <div id="boot-log" style="font-size:11px;color:#888;font-family:monospace;text-align:left;line-height:1.6"></div>
    </div>
  </div>

  <!-- App root — JS builds the entire DOM inside here -->
  <div id="app" role="application" aria-label="Digital Brand Command Center"></div>

  <!-- Inline global error handler — must run before any external scripts load -->
  <script>
    function _bLog(msg) {
      var el = document.getElementById('boot-log');
      if (el) el.innerHTML += '<div>' + msg + '</div>';
    }
    _bLog('Scripts loading...');

    window.onerror = function(msg, src, line) {
      var inner = document.getElementById('boot-status-inner');
      if (inner) {
        inner.innerHTML =
          '<div style="font-size:24px;margin-bottom:12px">&#9888;</div>' +
          '<div style="font-size:15px;font-weight:bold;color:#c00;margin-bottom:12px">JavaScript error — cannot start</div>' +
          '<div style="font-size:12px;background:#fee;border:1px solid #fcc;border-radius:6px;padding:12px;text-align:left;font-family:monospace;word-break:break-all">' +
          (msg || '') + '<br><span style="color:#888">' + ((src || '').split('/').pop()) + ':' + (line || 0) + '</span></div>' +
          '<button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#ffe;border:1px solid #cca;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px">Reload page</button>';
        document.getElementById('boot-status').style.display = 'flex';
      }
      return false;
    };
  </script>

  <!-- Config must load before everything else -->
  <script src="/config.js" onerror="_bLog('ERROR: /config.js failed to load (404?)')"></script>
  <script>if(typeof CONFIG!=='undefined'){_bLog('config.js OK');}else{_bLog('WARN: CONFIG not defined after config.js');}</script>

  <!-- Data layer -->
  <script src="/js/data.js" onerror="_bLog('ERROR: /js/data.js failed to load (404?)')"></script>
  <script>if(typeof fetchTab==='function'){_bLog('data.js OK');}else{_bLog('WARN: data.js functions missing');}</script>

  <!-- Component renderers -->
  <script src="/js/components.js" onerror="_bLog('ERROR: /js/components.js failed to load (404?)')"></script>
  <script>if(typeof Sidebar==='function'){_bLog('components.js OK');}else{_bLog('WARN: components.js functions missing');}</script>

  <!-- App orchestration -->
  <script src="/js/app.js" onerror="_bLog('ERROR: /js/app.js failed to load (404?)')"></script>

</body>
</html>
